<!doctype html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Träningsapp</title>
    <meta
      name="description"
      content="En tillgänglig Träningsapp för att logga och redigera träningspass."
    />
    <link rel="stylesheet" href="../styles/edit-item.css" />
  </head>

  <body>
    <header>
      <h1>Träningsapp</h1>
    </header>

    <main>
      <!-- Status messages -->
      <div
        id="status"
        role="status"
        aria-live="polite"
        aria-atomic="true"
      ></div>

      <!-- Form section -->
      <section aria-labelledby="form-heading">
        <h2 id="form-heading">Lägg till / redigera träningspass</h2>

        <form id="workout-form">
          <input type="hidden" id="workout-id" />

          <label for="name">Passnamn</label>
          <input id="name" type="text" required aria-required="true" />

          <label for="name">Välj övning</label>
          <select id="exercise" required>
            <option value="">Övningar</option>
          </select>

          <label for="duration">Tid (minuter)</label>
          <input
            id="duration"
            type="number"
            min="1"
            required
            aria-required="true"
          />

          <label for="notes">Anteckningar</label>
          <textarea id="notes" rows="3"></textarea>

          <button type="submit">Spara träningspass</button>
        </form>
      </section>

      <!-- Workout list -->
      <section aria-labelledby="list-heading">
        <h2 id="list-heading">Mina träningspass</h2>
        <ul
          id="workout-list"
          aria-live="polite"
          aria-relevant="additions removals"
        ></ul>
      </section>
    </main>

    <footer>
      <p>&copy; 2026 Träningsapp</p>
    </footer>

    <script src="../scripts/storage/exercisesStorage.js"></script>
    <script src="../scripts/storage/workoutStorage.js"></script>
    <script src="../scripts/ui/renderWorkouts.js"></script>
  </body>
</html>
