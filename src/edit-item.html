<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Workout App</title>
    <meta
      name="description"
      content="An available workout app able to log and edit workout sessions."
    />
    <link rel="stylesheet" href="../styles/base.css" />
    <link rel="stylesheet" href="../styles/layout.css" />
    <link rel="stylesheet" href="../styles/components.css" />
    <link rel="stylesheet" href="../styles/side-panel.css" />
    <link rel="stylesheet" href="../styles/edit-item.css" />
  </head>

  <body class="page-edit-item">
    <header>
      <h1>Workout App</h1>
    </header>

    <main>
      <!-- Status messages -->
      <div
        id="status"
        role="status"
        aria-live="polite"
        aria-atomic="true"
      ></div>

      <!-- Form section -->
      <section aria-labelledby="form-heading">
        <h2 id="form-heading">Add / edit workout session</h2>

        <form id="workout-form">
          <input type="hidden" id="workout-id" />

          <label for="name">Session name</label>
          <input id="name" type="text" required aria-required="true" />

          <label for="exercise">Choose workout</label>
          <select id="exercise" required>
            <option value="">Select exercise</option>
          </select>

          <label for="duration">Time (minutes)</label>
          <input
            id="duration"
            type="number"
            min="1"
            required
            aria-required="true"
          />

          <label for="notes">Notes</label>
          <textarea id="notes" rows="3"></textarea>

          <button type="submit">Save workout session</button>
        </form>
      </section>

      <!-- Workout list -->
      <section aria-labelledby="list-heading">
        <h2 id="list-heading">My workout sessions</h2>
        <ul
          id="workout-list"
          aria-live="polite"
          aria-relevant="additions removals"
        ></ul>
      </section>
    </main>

    <footer>
      <p>&copy; 2026 Workout App</p>
    </footer>

    <!-- Added type="module" to all script tags so ES module exports/imports work correctly -->
    <script type="module" src="../scripts/storage/exercises.js"></script>
    <script type="module" src="../scripts/storage/workouts.js"></script>
    <script type="module" src="../scripts/ui/workouts-form.js"></script>
  </body>
</html>
