<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Workout App</title>

    <link rel="stylesheet" href="../styles/style.css" />
    <link rel="stylesheet" href="../styles/side-panel.css" />
  </head>

  <body class="drawer-right">
    <!-- Mobile menu toggle -->
    <button
      id="menu-toggle"
      aria-label="Open menu"
      class="menu-toggle"
      aria-expanded="false"
    >
      <span class="bar bar-1"></span>
      <span class="bar bar-2"></span>
      <span class="bar bar-3"></span>
    </button>

    <!-- Side navigation panel -->
    <nav id="side-panel" class="side-panel" aria-hidden="true">
      <h2 class="visually-hidden">Side Navigation</h2>
      >

      <ul class="side-panel-list">
        <li><button data-nav="list">Show Items</button></li>
        <li><button data-nav="add">Add Items</button></li>
        <li><button data-nav="search">Search Items</button></li>
        <li><button data-nav="settings">Settings</button></li>
      </ul>

      <button id="theme-toggle" class="theme-toggle-btn">
        <span class="theme-icon"></span>
      </button>
    </nav>

    <!-- Backdrop for the sidebar -->
    <div id="side-panel-backdrop"></div>

    <header>
      <h1>Welcome to My Website</h1>
      <nav aria-label="Primary navigation">
        <ul>
          <li><a href="#home">Home</a></li>
          <li><a href="exerciseBank.html">Workouts</a></li>
          <li><a href="#contact">exercise plans</a></li>
        </ul>
      </nav>
    </header>

    <main id="app-root">
      <section id="generate-workout" class="card">
        <h2 class="section-heading">Generate Workout</h2>
        <p class="section-subtitle">
          Select a muscle group and generate a random workout
        </p>

        <div class="generate-controls">
          <label for="workout-input">Muscle group</label>
          <input
            type="text"
            id="workout-input"
            placeholder="Example: Hamstrings"
          />
          <button class="btn-accent" id="generate-btn">Generate</button>
        </div>
        <!-- random generated workout -->
        <ul id="workout-list"></ul>
      </section>

      <!-- App root (views will be injected here) -->
      <section id="app-content" aria-busy="true"></section>
    </main>

    <!-- Sidebar (non-module) -->
    <script src="../scripts/side-panel.js"></script>

    <!-- Theme toggle -->
    <script src="../scripts/theme.js"></script>

    <!-- App logic (module) -->
    <script type="module" src="../scripts/main.js"></script>
  </body>
</html>
